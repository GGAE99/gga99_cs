site_name: CS Knowledge Base
site_description: 컴퓨터 과학 기초부터 실무까지, 계층적으로 정리한 학습 노트
site_author: GGAE99
site_url: https://GGAE99.github.io/gga99_cs/

repo_url: https://github.com/GGAE99/gga99_cs
repo_name: GGAE99/gga99_cs
edit_uri: edit/main/

docs_dir: .
site_dir: _site

exclude_docs: |
  /.git/
  /.github/
  /.omc/
  /_site/
  /scripts/
  /mkdocs.yml
  /requirements.txt

theme:
  name: material
  language: ko
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - navigation.path
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드로 전환
  font:
    text: Noto Sans KR
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: 이 섹션 링크 복사
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - same-dir
  - awesome-pages
  - search:
      lang:
        - ko
        - en
